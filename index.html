<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incentive Register · Personal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Bricolage+Grotesque:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#122B22;
  --ink-2:#1E4034;
  --paper:#F7F5EF;
  --card:#FFFFFF;
  --rule:#E4E0D4;
  --gold:#C79A2A;
  --gold-soft:#FBF3DE;
  --green:#177245;
  --green-soft:#E4F2E9;
  --red:#B3402A;
  --red-soft:#FBEAE5;
  --muted:#7C7A6E;
  --shadow:0 1px 2px rgba(18,43,34,.06),0 8px 24px -12px rgba(18,43,34,.18);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'IBM Plex Sans',system-ui,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
.mono{font-family:'IBM Plex Mono',monospace}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit;font-size:14px}

/* ── Header ─────────────────────────── */
header{background:var(--ink);color:#F2EFE4;padding:18px 20px 16px;position:sticky;top:0;z-index:40;box-shadow:var(--shadow)}
.h-inner{max-width:980px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.brand h1{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;font-weight:800;letter-spacing:.2px;line-height:1}
.brand p{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:#C7BFA3;margin-top:5px;font-weight:600}
.h-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:8px;font-size:12.5px;font-weight:600;transition:transform .08s ease,opacity .15s;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn-gold{background:var(--gold);color:#241C05}
.btn-ghost{background:rgba(255,255,255,.08);color:#E9E4D2;border:1px solid rgba(255,255,255,.15)}
.btn-outline{background:#fff;border:1px solid var(--rule);color:var(--ink)}

/* ── Tabs ───────────────────────────── */
.tabs{display:flex;gap:6px;background:#fff;border:1px solid var(--rule);border-radius:12px;padding:5px;margin-bottom:16px;box-shadow:var(--shadow);flex-wrap:wrap}
.tab{flex:1 1 40%;min-width:120px;padding:10px 8px;border-radius:8px;font-size:12.5px;font-weight:700;color:var(--muted);transition:all .15s;letter-spacing:.3px}
@media(min-width:640px){.tab{flex:1}}
.tab.active{background:var(--ink);color:#F2EFE4}
.tab .t-due{display:block;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;margin-top:3px;color:inherit;opacity:.75}

/* ── Summary strip ──────────────────── */
.wrap{max-width:980px;margin:0 auto;padding:20px 16px 90px}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.s-card{background:var(--card);border:1px solid var(--rule);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.s-card .lbl{font-size:10px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;color:var(--muted)}
.s-card .val{font-family:'IBM Plex Mono',monospace;font-size:clamp(17px,3.4vw,24px);font-weight:600;margin-top:6px}
.s-card.earned .val{color:var(--ink)}
.s-card.paid .val{color:var(--green)}
.s-card.due .val{color:var(--red)}
.s-card.due.clear .val{color:var(--green)}
.s-card::after{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
.s-card.earned::after{background:var(--gold)}
.s-card.paid::after{background:var(--green)}
.s-card.due::after{background:var(--red)}
.s-card.due.clear::after{background:var(--green)}

/* ── Filters ────────────────────────── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filters select,.filters input[type=search]{padding:9px 12px;border:1px solid var(--rule);border-radius:8px;background:#fff;font-size:13px;font-weight:500;color:var(--ink);outline:none}
.filters select:focus,.filters input:focus{border-color:var(--gold)}
.filters input[type=search]{flex:1;min-width:140px}
.count-chip{font-size:11px;font-weight:700;color:var(--muted);margin-left:auto}

/* ── Month ledger ───────────────────── */
.month-block{background:var(--card);border:1px solid var(--rule);border-radius:14px;box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.m-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:13px 16px;background:linear-gradient(to bottom,#FCFBF7,#F6F4EC);border-bottom:1px solid var(--rule)}
.m-title{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700}
.m-title small{font-weight:600;color:var(--muted);font-size:11px;margin-left:6px;letter-spacing:1px}
.m-sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);text-align:right;line-height:1.7}
.m-sub b{color:var(--ink)}
.m-sub .due-amt{color:var(--red);font-weight:600}
.m-sub .due-amt.clear{color:var(--green)}

.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:520px}
th{font-size:10px;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);text-align:left;padding:9px 12px;border-bottom:1px solid var(--rule);font-weight:700;background:#FCFBF7}
td{padding:11px 12px;border-bottom:1px dashed var(--rule);vertical-align:top}
tr:last-child td{border-bottom:none}
td.num,th.num{text-align:right;font-family:'IBM Plex Mono',monospace;white-space:nowrap}
td .disp{font-weight:600}
td .rmk{display:block;font-size:11.5px;color:var(--muted);margin-top:3px;max-width:280px}
.pill{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.6px;padding:3px 8px;border-radius:99px;text-transform:uppercase}
.pill.paid{background:var(--green-soft);color:var(--green)}
.pill.partial{background:var(--gold-soft);color:#8a6510}
.pill.pending{background:var(--red-soft);color:var(--red)}
.row-actions{display:flex;gap:4px;justify-content:flex-end}
.icon-btn{width:28px;height:28px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);border:1px solid transparent;font-size:13px}
.icon-btn:hover{background:var(--paper);border-color:var(--rule);color:var(--ink)}
.icon-btn.del:hover{background:var(--red-soft);color:var(--red)}

/* ── Empty state ────────────────────── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .big{font-family:'Bricolage Grotesque',sans-serif;font-size:19px;color:var(--ink);font-weight:700;margin-bottom:6px}
.empty p{font-size:13px;max-width:340px;margin:0 auto 18px;line-height:1.6}

/* ── FAB ────────────────────────────── */
.fab{position:fixed;right:18px;bottom:18px;background:var(--gold);color:#241C05;width:56px;height:56px;border-radius:16px;font-size:26px;font-weight:600;box-shadow:0 8px 24px -6px rgba(199,154,42,.6);display:flex;align-items:center;justify-content:center;z-index:45;transition:transform .1s}
.fab:active{transform:scale(.92)}

/* ── Modal ──────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(18,43,34,.45);backdrop-filter:blur(2px);display:none;align-items:flex-end;justify-content:center;z-index:50;padding:0}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:92vh;overflow:auto;padding:20px 18px 26px;animation:up .22s ease}
@keyframes up{from{transform:translateY(30px);opacity:.4}to{transform:translateY(0);opacity:1}}
@media(min-width:640px){.overlay{align-items:center;padding:20px}.modal{border-radius:18px}}
.modal h2{font-family:'Bricolage Grotesque',sans-serif;font-size:17px;margin-bottom:16px}
.field{margin-bottom:13px}
.field label{display:block;font-size:10.5px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--rule);border-radius:9px;background:#FCFBF7;outline:none;font-size:14px}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold);background:#fff}
.field textarea{resize:vertical;min-height:64px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.bal-preview{font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:var(--paper);border:1px dashed var(--rule);border-radius:9px;padding:10px 12px;margin-bottom:14px;display:flex;justify-content:space-between}
.bal-preview b.neg{color:var(--red)}
.bal-preview b.pos{color:var(--green)}
.m-actions{display:flex;gap:10px;margin-top:6px}
.m-actions .btn{flex:1;justify-content:center;padding:12px}

/* ── Dashboard ──────────────────────── */
.bar-row{display:flex;align-items:center;gap:10px;margin:9px 0}
.bar-lbl{width:80px;font-size:12px;font-weight:600;flex-shrink:0}
.bar-track{flex:1;display:flex;align-items:center;gap:8px}
.bar{height:18px;background:linear-gradient(to right,var(--gold),#DDb45a);border-radius:4px;min-width:3px;transition:width .3s}
.bar-val{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:var(--ink)}
tr.grand td{font-weight:700;background:#FCFBF7;border-top:2px solid var(--rule);border-bottom:none;font-family:'IBM Plex Mono',monospace}
tr.grand td:first-child{font-family:'IBM Plex Sans',sans-serif}
.dash-pad{padding:14px 16px}

/* toast */
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:88px;background:var(--ink);color:#F2EFE4;font-size:12.5px;font-weight:600;padding:10px 18px;border-radius:99px;box-shadow:var(--shadow);z-index:60;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:560px){
  .summary{grid-template-columns:1fr 1fr}
  .s-card.due{grid-column:1/-1}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="h-inner">
    <div class="brand">
      <h1>Incentive Register</h1>
      <p>Personal · Month-wise · Sunshine</p>
    </div>
    <div class="h-actions">
      <button class="btn btn-ghost" onclick="exportCSV()">⤓ Export CSV</button>
      <button class="btn btn-ghost" onclick="backupJSON()">Backup</button>
      <button class="btn btn-ghost" onclick="document.getElementById('restoreFile').click()">Restore</button>
      <input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restoreJSON(this)">
    </div>
  </div>
</header>

<div class="wrap">

  <!-- Register tabs -->
  <div class="tabs">
    <button class="tab active" id="tab-dash" onclick="switchTab('dash')">📊 Dashboard<span class="t-due" id="due-dash"></span></button>
    <button class="tab" id="tab-disp" onclick="switchTab('disp')">Dispensaries<span class="t-due" id="due-disp"></span></button>
    <button class="tab" id="tab-hitlab" onclick="switchTab('hitlab')">HitLab<span class="t-due" id="due-hitlab"></span></button>
    <button class="tab" id="tab-navaj" onclick="switchTab('navaj')">ESIC Team<span class="t-due" id="due-navaj"></span></button>
    <button class="tab" id="tab-esic" onclick="switchTab('esic')">ESIC Billing<span class="t-due" id="due-esic"></span></button>
    <button class="tab" id="tab-exp" onclick="switchTab('exp')">Other Expenses<span class="t-due" id="due-exp"></span></button>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="s-card earned"><div class="lbl" id="lblEarned">Total Incentive</div><div class="val" id="sumEarned">₹0</div></div>
    <div class="s-card paid"><div class="lbl" id="lblPaid">Total Paid</div><div class="val" id="sumPaid">₹0</div></div>
    <div class="s-card due" id="dueCard"><div class="lbl" id="lblDue">Balance Due</div><div class="val" id="sumDue">₹0</div></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <select id="fYear" onchange="render()"></select>
    <select id="fMonth" onchange="render()">
      <option value="all">All months</option>
    </select>
    <select id="fMain" onchange="render()"></select>
    <input type="search" id="fSearch" placeholder="Search remark…" oninput="render()">
    <span class="count-chip" id="countChip"></span>
  </div>

  <!-- Ledger -->
  <div id="ledger"></div>

</div>

<button class="fab" title="Add entry" onclick="openModal()">+</button>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2 id="modalTitle">Add entry</h2>

    <div class="field" id="mainField">
      <label id="mainFieldLabel">Dispensary</label>
      <select id="inMain"></select>
    </div>
    <div class="field" id="newMainField" style="display:none">
      <label id="newMainLabel">New name</label>
      <input type="text" id="inNewMain" placeholder="Type name…">
    </div>

    <div class="grid2">
      <div class="field">
        <label>Month</label>
        <select id="inMonth"></select>
      </div>
      <div class="field">
        <label>Year</label>
        <select id="inYear"></select>
      </div>
    </div>

    <!-- cases × rate (disp, hitlab) -->
    <div class="grid2" id="casesRateFields">
      <div class="field">
        <label>No. of cases</label>
        <input type="number" id="inCases" min="0" step="1" placeholder="0" oninput="updatePreview()">
      </div>
      <div class="field">
        <label>Amount per case (₹)</label>
        <input type="number" id="inRate" min="0" step="any" placeholder="0" oninput="updatePreview()">
      </div>
    </div>

    <!-- cases + direct total (esic) -->
    <div class="grid2" id="casesTotalFields" style="display:none">
      <div class="field">
        <label>No. of cases</label>
        <input type="number" id="inCases2" min="0" step="1" placeholder="0" oninput="updatePreview()">
      </div>
      <div class="field">
        <label>Total amount (₹)</label>
        <input type="number" id="inAmountDirect" min="0" step="any" placeholder="0" oninput="updatePreview()">
      </div>
    </div>

    <!-- flat amount (navaj salary) -->
    <div class="field" id="flatField" style="display:none">
      <label id="flatLabel">Salary (₹)</label>
      <input type="number" id="inFlat" min="0" step="any" placeholder="0" oninput="updatePreview()">
    </div>

    <div class="bal-preview" id="totRow"><span id="totLabel">Total incentive</span><b id="totPreview" class="pos">₹0</b></div>

    <div class="field">
      <label id="paidLabel">Total paid (₹)</label>
      <input type="number" id="inPaid" min="0" step="any" placeholder="0" oninput="updatePreview()">
    </div>

    <div class="bal-preview"><span id="dueLabel">Balance due</span><b id="balPreview">₹0</b></div>

    <div class="field">
      <label>Remark</label>
      <textarea id="inRemark" placeholder="Any note…"></textarea>
    </div>

    <div class="m-actions">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-gold" id="saveBtn" onclick="saveEntry()">Save entry</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';
const KEY = 'incentive_register_v1';
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DEFAULT_DISPS = ['Waluj','Waluj DCBO','Paithan'];
const DEFAULT_EMPLOYEES = ['Employee 1','Employee 2','Employee 3','Employee 4'];

/*
 Register configs:
 mode: 'cases_rate' (cases × rate = total) | 'cases_total' (cases + direct total) | 'flat' (single amount)
*/
const REGS = {
  disp:   { tab:'Dispensaries', mainKey:'dispensary', mainLabel:'Dispensary', listKey:'dispensaries',
            mode:'cases_rate', earnLbl:'Total Incentive', paidLbl:'Total Paid', dueLbl:'Balance Due',
            paidInput:'Total paid (₹)', totLbl:'Total incentive', paidCol:'Paid', totCol:'Total',
            firstCol:'Dispensary / Remark', addNew:'＋ Add new dispensary…' },
  hitlab: { tab:'HitLab', mainKey:null, mainLabel:null, listKey:null,
            mode:'cases_rate', earnLbl:'Total Incentive', paidLbl:'Total Paid', dueLbl:'Balance Due',
            paidInput:'Total paid (₹)', totLbl:'Total incentive', paidCol:'Paid', totCol:'Total',
            firstCol:'Particulars / Remark' },
  navaj:  { tab:'ESIC Team', mainKey:null, mainLabel:null, listKey:null,
            mode:'flat', flatLbl:'Contract amount (₹)', earnLbl:'Total Contract', paidLbl:'Total Paid', dueLbl:'Balance Due',
            paidInput:'Paid (₹)', totLbl:'Contract amount', paidCol:'Paid', totCol:'Amount',
            firstCol:'Contract / Remark' },
  esic:   { tab:'ESIC Billing', mainKey:null, mainLabel:null, listKey:null,
            mode:'cases_total', earnLbl:'Total Billed', paidLbl:'Total Received', dueLbl:'Pending from ESIC',
            paidInput:'Amount received (₹)', totLbl:'Billed amount', paidCol:'Received', totCol:'Billed',
            firstCol:'Billing / Remark' },
  exp:    { tab:'Other Expenses', mainKey:null, mainLabel:null, listKey:null,
            mode:'flat', flatLbl:'Amount (₹)', earnLbl:'Total Expenses', noPaid:true,
            totLbl:'Expense amount', totCol:'Amount',
            firstCol:'Expense / Remark' }
};

let state = load();
let editId = null;
let activeTab = 'dash';

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){
      const s = JSON.parse(raw);
      if(s && Array.isArray(s.entries)){
        if(!Array.isArray(s.dispensaries) || !s.dispensaries.length) s.dispensaries = [...DEFAULT_DISPS];
        if(!Array.isArray(s.employees) || !s.employees.length) s.employees = [...DEFAULT_EMPLOYEES];
        return s;
      }
    }
  }catch(e){}
  return { entries: [], dispensaries: [...DEFAULT_DISPS], employees: [...DEFAULT_EMPLOYEES] };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function fmt(n){ return '₹' + Number(n||0).toLocaleString('en-IN',{maximumFractionDigits:2}); }
function esc(s){ return String(s??'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function regOf(e){ return e.reg || 'disp'; }
function cfg(){ return REGS[activeTab] || REGS.disp; }

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove('show'), 2200);
}

function switchTab(tab){
  activeTab = tab;
  Object.keys(REGS).concat('dash').forEach(r => {
    const el = document.getElementById('tab-'+r);
    if(el) el.classList.toggle('active', r===tab);
  });
  render();
}

function statusOf(e){
  const bal = (e.amount||0) - (e.paid||0);
  if((e.paid||0) <= 0 && (e.amount||0) > 0) return ['pending','Pending'];
  if(bal > 0.004) return ['partial','Partial'];
  return ['paid','Paid'];
}

/* ── Filters setup ── */
function refreshFilterOptions(){
  const c = cfg();
  const dataReg = activeTab==='dash' ? 'disp' : activeTab;
  const years = [...new Set(state.entries.filter(e=>regOf(e)===dataReg).map(e=>e.year))].sort((a,b)=>b-a);
  const nowY = new Date().getFullYear();
  if(!years.includes(nowY)) years.unshift(nowY);
  const fY = document.getElementById('fYear');
  const cur = fY.value;
  fY.innerHTML = '<option value="all">All years</option>' + years.map(y=>`<option value="${y}">${y}</option>`).join('');
  fY.value = [...fY.options].some(o=>o.value===cur) ? cur : 'all';

  const fM = document.getElementById('fMonth');
  const curM = fM.value || 'all';
  fM.innerHTML = '<option value="all">All months</option>' + MONTHS.map((m,i)=>`<option value="${i+1}">${m}</option>`).join('');
  fM.value = curM;

  document.getElementById('fMonth').style.display = activeTab==='dash' ? 'none' : '';
  document.getElementById('fSearch').style.display = activeTab==='dash' ? 'none' : '';

  const fMain = document.getElementById('fMain');
  if(activeTab!=='dash' && c.listKey){
    fMain.style.display = '';
    const curD = fMain.value || 'all';
    fMain.innerHTML = `<option value="all">All ${c.mainLabel.toLowerCase()}s</option>` + state[c.listKey].map(d=>`<option value="${esc(d)}">${esc(d)}</option>`).join('');
    fMain.value = [...fMain.options].some(o=>o.value===curD) ? curD : 'all';
  }else{
    fMain.style.display = 'none';
    fMain.value = 'all';
  }
}

/* ── Render ── */
function render(){
  refreshFilterOptions();
  if(activeTab==='dash'){ renderDashboard(); return; }
  const c = cfg();
  const fY = document.getElementById('fYear').value;
  const fM = document.getElementById('fMonth').value;
  const fMain = document.getElementById('fMain').value;
  const q  = document.getElementById('fSearch').value.trim().toLowerCase();

  const rows = state.entries.filter(e =>
    regOf(e)===activeTab &&
    (fY==='all' || e.year===+fY) &&
    (fM==='all' || e.month===+fM) &&
    (!c.mainKey || fMain==='all' || e[c.mainKey]===fMain) &&
    (!q || (e.remark||'').toLowerCase().includes(q) || (e[c.mainKey]||'').toLowerCase().includes(q))
  );

  // Tab due chips (all-time, per register)
  Object.keys(REGS).forEach(r => {
    const all = state.entries.filter(e => regOf(e)===r);
    const el = document.getElementById('due-'+r);
    if(REGS[r].noPaid){
      const spent = all.reduce((s,e)=>s+(+e.amount||0),0);
      el.textContent = all.length ? 'Spent ' + fmt(spent) : '';
    }else{
      const due = all.reduce((s,e)=>s+((+e.amount||0)-(+e.paid||0)),0);
      el.textContent = all.length ? 'Due ' + fmt(due) : '';
    }
  });

  // Summary labels + values
  const showCases = c.mode!=='flat';
  const tEarn = rows.reduce((s,e)=>s+(+e.amount||0),0);
  const tPaid = rows.reduce((s,e)=>s+(+e.paid||0),0);
  const tCases = rows.reduce((s,e)=>s+(+e.cases||0),0);
  const tDue  = tEarn - tPaid;
  document.getElementById('lblEarned').textContent = c.earnLbl + (showCases ? ` · ${tCases} cases` : '');
  document.getElementById('sumEarned').textContent = fmt(tEarn);
  const paidCard = document.getElementById('sumPaid').closest('.s-card');
  const dueCardEl = document.getElementById('dueCard');
  if(c.noPaid){
    paidCard.style.display = 'none';
    dueCardEl.style.display = 'none';
  }else{
    paidCard.style.display = '';
    dueCardEl.style.display = '';
    document.getElementById('lblPaid').textContent = c.paidLbl;
    document.getElementById('lblDue').textContent = c.dueLbl;
    document.getElementById('sumPaid').textContent   = fmt(tPaid);
    document.getElementById('sumDue').textContent    = fmt(tDue);
    dueCardEl.classList.toggle('clear', tDue <= 0.004);
  }
  document.getElementById('countChip').textContent = rows.length ? rows.length + ' entr' + (rows.length===1?'y':'ies') : '';

  // Group by year-month desc
  const groups = {};
  rows.forEach(e => { const k = e.year*100 + e.month; (groups[k] ||= []).push(e); });
  const keys = Object.keys(groups).map(Number).sort((a,b)=>b-a);

  const ledger = document.getElementById('ledger');
  if(!keys.length){
    const hasAny = state.entries.some(e=>regOf(e)===activeTab);
    ledger.innerHTML = `<div class="empty">
      <div class="big">${hasAny ? 'No entries match these filters' : c.tab + ' register is empty'}</div>
      <p>${hasAny ? 'Change the filters above to see other entries.' : 'Tap the + button to add the first entry for ' + c.tab + '.'}</p>
      ${hasAny ? '' : '<button class="btn btn-gold" onclick="openModal()">+ Add first entry</button>'}
    </div>`;
    return;
  }

  ledger.innerHTML = keys.map(k => {
    const y = Math.floor(k/100), m = k%100;
    const list = groups[k].slice().sort((a,b)=> (a[c.mainKey]||'').localeCompare(b[c.mainKey]||'') || (a.createdAt||'').localeCompare(b.createdAt||''));
    const gE = list.reduce((s,e)=>s+(+e.amount||0),0);
    const gP = list.reduce((s,e)=>s+(+e.paid||0),0);
    const gC = list.reduce((s,e)=>s+(+e.cases||0),0);
    const gD = gE - gP;
    return `<section class="month-block">
      <div class="m-head">
        <div class="m-title">${MONTHS[m-1]} ${y} <small>M-${String(m).padStart(2,'0')}</small></div>
        <div class="m-sub">
          ${c.noPaid
            ? `${c.totCol} <b>${fmt(gE)}</b>`
            : `${showCases ? `Cases <b>${gC}</b> · ` : ''}${c.totCol} <b>${fmt(gE)}</b> · ${c.paidCol} <b>${fmt(gP)}</b><br>
          Due <span class="due-amt ${gD<=0.004?'clear':''}">${fmt(gD)}</span>`}
        </div>
      </div>
      <div class="tbl-scroll">
      <table>
        <thead><tr>
          <th>${c.firstCol}</th>
          ${showCases ? '<th class="num">Cases</th>' : ''}
          <th class="num">${c.totCol}</th>
          ${c.noPaid ? '' : `<th class="num">${c.paidCol}</th>
          <th>Status</th>
          <th class="num">Due</th>`}
          <th></th>
        </tr></thead>
        <tbody>
        ${list.map(e => {
          const bal = (e.amount||0)-(e.paid||0);
          const [cls,lbl] = statusOf(e);
          let casesCell = '';
          if(showCases){
            const inner = e.cases != null
              ? (c.mode==='cases_rate' && e.rate != null ? `${e.cases}<span style="color:var(--muted)"> × ${fmt(e.rate)}</span>` : `${e.cases}`)
              : '—';
            casesCell = `<td class="num">${inner}</td>`;
          }
          const mainLabel = c.mainKey ? (e[c.mainKey] || '—') : (e.remark || c.tab + ' entry');
          const subRemark = c.mainKey ? e.remark : '';
          return `<tr>
            <td><span class="disp">${esc(mainLabel)}</span>${subRemark?`<span class="rmk">${esc(subRemark)}</span>`:''}</td>
            ${casesCell}
            <td class="num">${fmt(e.amount)}</td>
            ${c.noPaid ? '' : `<td class="num">${fmt(e.paid)}</td>
            <td><span class="pill ${cls}">${lbl}</span></td>
            <td class="num" style="color:${bal>0.004?'var(--red)':'var(--green)'}">${fmt(bal)}</td>`}
            <td><div class="row-actions">
              <button class="icon-btn" title="Edit" onclick="openModal('${e.id}')">✎</button>
              <button class="icon-btn del" title="Delete" onclick="delEntry('${e.id}')">🗑</button>
            </div></td>
          </tr>`;
        }).join('')}
        </tbody>
      </table>
      </div>
    </section>`;
  }).join('');
}


/* ── Dashboard ── */
function updateTabChips(){
  Object.keys(REGS).forEach(r => {
    const all = state.entries.filter(e => regOf(e)===r);
    const el = document.getElementById('due-'+r);
    if(!el) return;
    if(REGS[r].noPaid){
      const spent = all.reduce((s,e)=>s+(+e.amount||0),0);
      el.textContent = all.length ? 'Spent ' + fmt(spent) : '';
    }else{
      const due = all.reduce((s,e)=>s+((+e.amount||0)-(+e.paid||0)),0);
      el.textContent = all.length ? 'Due ' + fmt(due) : '';
    }
  });
}

function renderDashboard(){
  updateTabChips();
  const fY = document.getElementById('fYear').value;
  const rows = state.entries.filter(e =>
    regOf(e)==='disp' && (fY==='all' || e.year===+fY)
  );

  // Summary cards for dispensaries register
  const tEarn = rows.reduce((s,e)=>s+(+e.amount||0),0);
  const tPaid = rows.reduce((s,e)=>s+(+e.paid||0),0);
  const tCases = rows.reduce((s,e)=>s+(+e.cases||0),0);
  const tDue = tEarn - tPaid;
  document.getElementById('lblEarned').textContent = `Total Incentive · ${tCases} cases`;
  document.getElementById('sumEarned').textContent = fmt(tEarn);
  const paidCard = document.getElementById('sumPaid').closest('.s-card');
  const dueCardEl = document.getElementById('dueCard');
  paidCard.style.display = ''; dueCardEl.style.display = '';
  document.getElementById('lblPaid').textContent = 'Total Paid';
  document.getElementById('lblDue').textContent = 'Balance Due';
  document.getElementById('sumPaid').textContent = fmt(tPaid);
  document.getElementById('sumDue').textContent = fmt(tDue);
  dueCardEl.classList.toggle('clear', tDue <= 0.004);
  document.getElementById('countChip').textContent = '';

  const ledger = document.getElementById('ledger');
  if(!rows.length){
    ledger.innerHTML = `<div class="empty">
      <div class="big">No dispensary entries yet</div>
      <p>Dispensaries tab me entries daalo — yahan month-wise cases ka progress dikhega.</p>
    </div>`;
    return;
  }

  // Dispensary list (known + any found in entries)
  const disps = [...state.dispensaries];
  rows.forEach(e => { if(e.dispensary && !disps.includes(e.dispensary)) disps.push(e.dispensary); });

  // Month keys ascending (chronological progress)
  const keys = [...new Set(rows.map(e => e.year*100 + e.month))].sort((a,b)=>a-b);
  const mLabel = k => MONTHS[(k%100)-1].slice(0,3) + ' ' + Math.floor(k/100);

  // cases[key][disp] and totals
  const cell = {};
  keys.forEach(k => cell[k] = {});
  rows.forEach(e => {
    const k = e.year*100 + e.month;
    cell[k][e.dispensary] = (cell[k][e.dispensary]||0) + (+e.cases||0);
  });
  const dispTot = {}; disps.forEach(d => dispTot[d]=0);
  const monthCases = {}, monthAmt = {};
  keys.forEach(k => {
    monthCases[k] = disps.reduce((s,d)=>s+(cell[k][d]||0),0);
    monthAmt[k] = rows.filter(e=>e.year*100+e.month===k).reduce((s,e)=>s+(+e.amount||0),0);
    disps.forEach(d => dispTot[d]+= (cell[k][d]||0));
  });
  const grandCases = keys.reduce((s,k)=>s+monthCases[k],0);
  const grandAmt = keys.reduce((s,k)=>s+monthAmt[k],0);
  const maxMonth = Math.max(...keys.map(k=>monthCases[k]), 1);

  ledger.innerHTML = `
  <section class="month-block">
    <div class="m-head">
      <div class="m-title">Cases Register — Dispensary wise</div>
      <div class="m-sub">Total cases <b>${grandCases}</b></div>
    </div>
    <div class="tbl-scroll">
    <table>
      <thead><tr>
        <th>Month</th>
        ${disps.map(d=>`<th class="num">${esc(d)}</th>`).join('')}
        <th class="num">Total Cases</th>
        <th class="num">Incentive</th>
      </tr></thead>
      <tbody>
        ${keys.map(k=>`<tr>
          <td><span class="disp">${mLabel(k)}</span></td>
          ${disps.map(d=>`<td class="num">${cell[k][d] ? cell[k][d] : '<span style="color:var(--muted)">—</span>'}</td>`).join('')}
          <td class="num"><b>${monthCases[k]}</b></td>
          <td class="num">${fmt(monthAmt[k])}</td>
        </tr>`).join('')}
        <tr class="grand">
          <td>TOTAL</td>
          ${disps.map(d=>`<td class="num">${dispTot[d]}</td>`).join('')}
          <td class="num">${grandCases}</td>
          <td class="num">${fmt(grandAmt)}</td>
        </tr>
      </tbody>
    </table>
    </div>
  </section>

  <section class="month-block">
    <div class="m-head">
      <div class="m-title">Monthly Progress <small>CASES</small></div>
      <div class="m-sub">Peak <b>${maxMonth}</b></div>
    </div>
    <div class="dash-pad">
      ${keys.map(k=>`<div class="bar-row">
        <span class="bar-lbl">${mLabel(k)}</span>
        <span class="bar-track"><span class="bar" style="width:${Math.round(monthCases[k]/maxMonth*100)}%"></span>
        <span class="bar-val">${monthCases[k]}</span></span>
      </div>`).join('')}
    </div>
  </section>`;
}

/* ── Modal ── */
function modalReg(){
  if(editId){
    const e = state.entries.find(x=>x.id===editId);
    if(e) return regOf(e);
  }
  return activeTab==='dash' ? 'disp' : activeTab;
}

function fillModalOptions(reg){
  const c = REGS[reg];
  if(c.mainKey){
    const sel = document.getElementById('inMain');
    sel.innerHTML = state[c.listKey].map(d=>`<option value="${esc(d)}">${esc(d)}</option>`).join('')
      + `<option value="__new__">${c.addNew}</option>`;
    sel.onchange = () => {
      document.getElementById('newMainField').style.display = sel.value==='__new__' ? 'block' : 'none';
    };
  }
  const mSel = document.getElementById('inMonth');
  mSel.innerHTML = MONTHS.map((m,i)=>`<option value="${i+1}">${String(i+1).padStart(2,'0')} — ${m}</option>`).join('');
  const ySel = document.getElementById('inYear');
  const nowY = new Date().getFullYear();
  let ys = [];
  for(let y=nowY+1; y>=Math.min(2026, nowY-4); y--) ys.push(y);
  ySel.innerHTML = ys.map(y=>`<option value="${y}">${y}</option>`).join('');
}

function setModalLayout(reg){
  const c = REGS[reg];
  document.getElementById('mainField').style.display = c.mainKey ? 'block' : 'none';
  if(c.mainKey){
    document.getElementById('mainFieldLabel').textContent = c.mainLabel;
    document.getElementById('newMainLabel').textContent = 'New ' + c.mainLabel.toLowerCase() + ' name';
  }
  document.getElementById('casesRateFields').style.display = c.mode==='cases_rate' ? 'grid' : 'none';
  document.getElementById('casesTotalFields').style.display = c.mode==='cases_total' ? 'grid' : 'none';
  document.getElementById('flatField').style.display = c.mode==='flat' ? 'block' : 'none';
  if(c.mode==='flat') document.getElementById('flatLabel').textContent = c.flatLbl;
  document.getElementById('totLabel').textContent = c.totLbl;
  document.getElementById('totRow').style.display = c.mode==='cases_rate' ? 'flex' : 'none';
  const paidWrap = document.getElementById('inPaid').closest('.field');
  const dueRow = document.getElementById('balPreview').closest('.bal-preview');
  if(c.noPaid){
    paidWrap.style.display = 'none';
    dueRow.style.display = 'none';
  }else{
    paidWrap.style.display = 'block';
    dueRow.style.display = 'flex';
    document.getElementById('paidLabel').textContent = c.paidInput;
    document.getElementById('dueLabel').textContent = c.dueLbl;
  }
}

function currentAmount(reg){
  const c = REGS[reg];
  if(c.mode==='cases_rate'){
    return (+document.getElementById('inCases').value||0) * (+document.getElementById('inRate').value||0);
  }
  if(c.mode==='cases_total'){
    return +document.getElementById('inAmountDirect').value||0;
  }
  return +document.getElementById('inFlat').value||0;
}

function updatePreview(){
  const reg = modalReg();
  const a = currentAmount(reg);
  const p = +document.getElementById('inPaid').value || 0;
  document.getElementById('totPreview').textContent = fmt(a);
  const b = a - p;
  const el = document.getElementById('balPreview');
  el.textContent = fmt(b);
  el.className = b > 0.004 ? 'neg' : 'pos';
}

function openModal(id){
  editId = id || null;
  const reg = modalReg();
  const c = REGS[reg];
  fillModalOptions(reg);
  setModalLayout(reg);
  document.getElementById('newMainField').style.display='none';
  document.getElementById('inNewMain').value='';
  const now = new Date();
  if(editId){
    const e = state.entries.find(x=>x.id===editId);
    if(!e) return;
    document.getElementById('modalTitle').textContent = 'Edit ' + c.tab + ' entry';
    document.getElementById('saveBtn').textContent='Update entry';
    if(c.mainKey){
      const sel = document.getElementById('inMain');
      sel.value = e[c.mainKey];
      if(sel.value !== e[c.mainKey]){ // value removed from list
        state[c.listKey].push(e[c.mainKey]); fillModalOptions(reg);
        sel.value = e[c.mainKey];
      }
    }
    document.getElementById('inMonth').value = e.month;
    document.getElementById('inYear').value = e.year;
    if(c.mode==='cases_rate'){
      document.getElementById('inCases').value = e.cases ?? (e.amount ? 1 : '');
      document.getElementById('inRate').value = e.rate ?? (e.amount || '');
    }else if(c.mode==='cases_total'){
      document.getElementById('inCases2').value = e.cases ?? '';
      document.getElementById('inAmountDirect').value = e.amount ?? '';
    }else{
      document.getElementById('inFlat').value = e.amount ?? '';
    }
    document.getElementById('inPaid').value = e.paid;
    document.getElementById('inRemark').value = e.remark || '';
  }else{
    document.getElementById('modalTitle').textContent = 'Add ' + c.tab + ' entry';
    document.getElementById('saveBtn').textContent='Save entry';
    document.getElementById('inMonth').value = now.getMonth()+1;
    document.getElementById('inYear').value = now.getFullYear();
    ['inCases','inRate','inCases2','inAmountDirect','inFlat','inPaid'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('inRemark').value='';
  }
  updatePreview();
  document.getElementById('overlay').classList.add('open');
  const focusId = c.mode==='cases_rate' ? 'inCases' : (c.mode==='cases_total' ? 'inCases2' : 'inFlat');
  setTimeout(()=>document.getElementById(focusId).focus(), 120);
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); editId=null; }

function saveEntry(){
  const reg = modalReg();
  const c = REGS[reg];

  let mainVal = null;
  if(c.mainKey){
    mainVal = document.getElementById('inMain').value;
    if(mainVal==='__new__'){
      const nd = document.getElementById('inNewMain').value.trim();
      if(!nd){ toast('Enter ' + c.mainLabel.toLowerCase() + ' name'); return; }
      if(!state[c.listKey].includes(nd)) state[c.listKey].push(nd);
      mainVal = nd;
    }
  }

  let cases = null, rate = null;
  if(c.mode==='cases_rate'){
    cases = +document.getElementById('inCases').value;
    rate  = +document.getElementById('inRate').value;
    if(!(cases >= 0) || document.getElementById('inCases').value===''){ toast('Enter no. of cases'); return; }
    if(!(rate >= 0) || document.getElementById('inRate').value===''){ toast('Enter amount per case'); return; }
  }else if(c.mode==='cases_total'){
    cases = +document.getElementById('inCases2').value;
    if(!(cases >= 0) || document.getElementById('inCases2').value===''){ toast('Enter no. of cases'); return; }
    if(document.getElementById('inAmountDirect').value===''){ toast('Enter total amount'); return; }
  }else{
    if(document.getElementById('inFlat').value===''){ toast('Enter ' + c.flatLbl.toLowerCase()); return; }
  }

  const amount = currentAmount(reg);
  const paid = c.noPaid ? 0 : (+document.getElementById('inPaid').value || 0);
  if(amount < 0){ toast('Amount cannot be negative'); return; }
  if(paid < 0){ toast('Paid amount cannot be negative'); return; }

  const rec = {
    reg,
    month: +document.getElementById('inMonth').value,
    year: +document.getElementById('inYear').value,
    amount, paid,
    remark: document.getElementById('inRemark').value.trim()
  };
  if(c.mainKey) rec[c.mainKey] = mainVal;
  if(reg==='disp' || reg==='hitlab') rec.dispensary = c.mainKey ? mainVal : 'HitLab';
  if(cases !== null) rec.cases = cases;
  if(rate !== null) rec.rate = rate;

  if(editId){
    const i = state.entries.findIndex(x=>x.id===editId);
    if(i>-1) state.entries[i] = {...state.entries[i], ...rec, updatedAt:new Date().toISOString()};
    toast('Entry updated');
  }else{
    state.entries.push({ id:uid(), ...rec, createdAt:new Date().toISOString() });
    toast('Entry saved');
  }
  save(); closeModal(); render();
}

function delEntry(id){
  const e = state.entries.find(x=>x.id===id);
  if(!e) return;
  const c = REGS[regOf(e)];
  const label = c.mainKey ? e[c.mainKey] : c.tab;
  if(!confirm(`Delete ${label} — ${MONTHS[e.month-1]} ${e.year} entry?`)) return;
  state.entries = state.entries.filter(x=>x.id!==id);
  save(); render(); toast('Entry deleted');
}

/* ── Export / Backup ── */
function download(name, text, type){
  const blob = new Blob([text], {type});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 500);
}

function exportCSV(){
  if(activeTab==='dash'){ exportDashCSV(); return; }
  const c = cfg();
  const rows = state.entries.filter(e=>regOf(e)===activeTab)
    .sort((a,b)=> (b.year*100+b.month)-(a.year*100+a.month) || ((a[c.mainKey]||'')).localeCompare(b[c.mainKey]||''));
  if(!rows.length){ toast('Nothing to export in this tab yet'); return; }
  const csvCell = v => { v = String(v??''); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
  const showCases = c.mode!=='flat';
  const showRate = c.mode==='cases_rate';

  let head = ['Sr No'];
  if(c.mainKey) head.push(c.mainLabel);
  head.push('Month No','Month','Year');
  if(showCases) head.push('No of Cases');
  if(showRate) head.push('Amount Per Case');
  head.push(c.totCol + ' (₹)');
  if(!c.noPaid) head.push(c.paidCol + ' (₹)', 'Balance Due', 'Status');
  head.push('Remark');
  let csv = head.join(',') + '\n';

  rows.forEach((e,i)=>{
    const bal = (e.amount||0)-(e.paid||0);
    let r = [i+1];
    if(c.mainKey) r.push(csvCell(e[c.mainKey]));
    r.push(e.month, MONTHS[e.month-1], e.year);
    if(showCases) r.push(e.cases??'');
    if(showRate) r.push(e.rate??'');
    r.push(e.amount||0);
    if(!c.noPaid) r.push(e.paid||0, bal, statusOf(e)[1]);
    r.push(csvCell(e.remark));
    csv += r.join(',') + '\n';
  });

  const tE = rows.reduce((s,e)=>s+(+e.amount||0),0), tP = rows.reduce((s,e)=>s+(+e.paid||0),0), tC = rows.reduce((s,e)=>s+(+e.cases||0),0);
  csv += c.noPaid
    ? `TOTAL,,,,${tE},\n`
    : `TOTAL${c.mainKey?',':''},,,${showCases? ','+tC : ''}${showRate? ',' : ''},${tE},${tP},${tE-tP},,\n`;

  const fname = c.tab.replace(/\s+/g,'_') + '_' + new Date().toISOString().slice(0,10) + '.csv';
  download(fname, '\ufeff'+csv, 'text/csv;charset=utf-8');
  toast('CSV exported — opens in Excel');
}

function exportDashCSV(){
  const fY = document.getElementById('fYear').value;
  const rows = state.entries.filter(e => regOf(e)==='disp' && (fY==='all' || e.year===+fY));
  if(!rows.length){ toast('No dispensary entries yet'); return; }
  const disps = [...state.dispensaries];
  rows.forEach(e => { if(e.dispensary && !disps.includes(e.dispensary)) disps.push(e.dispensary); });
  const keys = [...new Set(rows.map(e => e.year*100 + e.month))].sort((a,b)=>a-b);
  const cell = {}; keys.forEach(k => cell[k]={});
  rows.forEach(e => { const k=e.year*100+e.month; cell[k][e.dispensary]=(cell[k][e.dispensary]||0)+(+e.cases||0); });
  let csv = 'Month,Year,' + disps.join(',') + ',Total Cases,Incentive (Rs)\n';
  const dispTot={}; disps.forEach(d=>dispTot[d]=0);
  let gC=0,gA=0;
  keys.forEach(k=>{
    const mc = disps.reduce((s,d)=>s+(cell[k][d]||0),0);
    const ma = rows.filter(e=>e.year*100+e.month===k).reduce((s,e)=>s+(+e.amount||0),0);
    disps.forEach(d=>dispTot[d]+=(cell[k][d]||0));
    gC+=mc; gA+=ma;
    csv += MONTHS[(k%100)-1] + ',' + Math.floor(k/100) + ',' + disps.map(d=>cell[k][d]||0).join(',') + ',' + mc + ',' + ma + '\n';
  });
  csv += 'TOTAL,,' + disps.map(d=>dispTot[d]).join(',') + ',' + gC + ',' + gA + '\n';
  download('Cases_Dashboard_' + new Date().toISOString().slice(0,10) + '.csv', '\ufeff'+csv, 'text/csv;charset=utf-8');
  toast('Dashboard CSV exported');
}

function backupJSON(){
  download('incentive_backup_' + new Date().toISOString().slice(0,10) + '.json', JSON.stringify(state,null,2), 'application/json');
  toast('Backup file downloaded');
}

function restoreJSON(input){
  const f = input.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const s = JSON.parse(r.result);
      if(!s || !Array.isArray(s.entries)) throw 0;
      if(!confirm(`Restore ${s.entries.length} entries? This will replace current data.`)) { input.value=''; return; }
      state = {
        entries: s.entries,
        dispensaries: Array.isArray(s.dispensaries)&&s.dispensaries.length ? s.dispensaries : [...DEFAULT_DISPS],
        employees: Array.isArray(s.employees)&&s.employees.length ? s.employees : [...DEFAULT_EMPLOYEES]
      };
      save(); render(); toast('Data restored');
    }catch(e){ toast('Invalid backup file'); }
    input.value='';
  };
  r.readAsText(f);
}

/* init */
render();
</script>
</body>
</html>
